command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000

env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: DATABRICKS_CATALOG
    value: classic_stable_kremer_catalog
  - name: DATABRICKS_SCHEMA
    value: data_collector
  # ENDPOINT_NAME resolved from the "database" app resource (re-attached on deploy — see docs/LAKEBASE.md).
  - name: ENDPOINT_NAME
    valueFrom: database
  - name: LAKEBASE_DEFAULT_SCHEMA
    value: data_collector
  # Synced by scripts/deploy.sh per target (data-collector-dev / data-collector-prod).
  - name: DATABRICKS_APP_NAME
    value: "data-collector-dev"
  # Comma-separated emails with permission to edit app branding (logo, title, colors).
  - name: APP_ADMIN_EMAILS
    value: "david.galluzzo@databricks.com"
  # hybrid | service_principal | user_obo — see README §3
  - name: UC_DATA_ACCESS_MODE
    value: "hybrid"

# sql-warehouse resource — deploy.sh syncs warehouse id before bundle deploy.
# Lakebase: deploy.sh re-attaches the "database" resource after bundle deploy (bundle TF cannot declare postgres yet).
resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "62c50dd91fadb932"
      permission: CAN_USE
